minimum_pre_commit_version: "3.0.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        stages: [pre-commit]
      - id: no-commit-to-branch
        stages: [pre-commit]
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        files: '\.ya?ml$'
        stages: [pre-commit]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        stages: [pre-commit]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.0.272
    hooks:
      - id: ruff
        stages: [pre-commit]
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.12.0
    hooks:
      - id: gitleaks
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt
        entry: yarn oxfmt
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: oxlint
        name: oxlint
        entry: yarn oxlint --deny-warnings
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: typescript-check
        name: typescript-check
        entry: bash -c "yarn tsc --noEmit"
        language: system
        pass_filenames: false
        stages: [pre-commit]
