name: Pull Request

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

jobs:
  prchecks:
    name: prchecks # Name needs to be unchanged to avoid updating branch rules
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python for pre-commit
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  assignAuthor:
    name: assignAuthor # Name needs to be unchanged to avoid updating branch rules
    if: github.event.pull_request.user.type != 'Bot' && github.event.action != 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to creator
        run: gh pr edit $PR_URL --add-assignee $PR_AUTHOR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{github.event.pull_request.html_url}}

  # Notify the integrations channel only when a Snyk auto merge fails pr checks
  notify_on_pr_failure:
    runs-on: ubuntu-latest
    needs:
      - prchecks
    # only check branch names that begin with snyk-
    if: ${{ failure() && startsWith(github.head_ref, 'snyk-') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_TITLE: ":boom: A Synk auto merge has failed pull request checks in ${{ github.repository }}."
          MSG_MINIMAL: true
          SLACK_WEBHOOK: ${{ secrets.INTEGRATIONS_SLACK_WEBHOOK }}
