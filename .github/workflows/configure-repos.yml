name: Configure Repositories

on:
  schedule:
    # Every Monday at 400 UTC
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  configure:
    name: Configure Repository Settings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm install @octokit/rest@22.0.1

      - name: Get GitHub App token
        id: app-token-step
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Configure repositories
        run: node .github/configure-repos-github.ts
        env:
          GITHUB_TOKEN: ${{ steps.app-token-step.outputs.token }}

      - name: Upload current config snapshots
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: config-snapshots-${{ github.run_number }}
          path: .github/config-snapshots/
          retention-days: 90
